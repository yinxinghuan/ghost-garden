  setTimeout(showEndingScreen, 2000);
}

function showEndingScreen() {
  const lv = gs.level; // 1/2/3
  const ep = t('endingP');
  const el = document.getElementById('ending');
  const pages = [...el.querySelectorAll('.ending-page')];
  const lblEl = document.getElementById('ending-ghost-lbl');
  const tapEl = document.getElementById('ending-tap');
  const retryBtn = document.getElementById('ending-retry');

  // еЎ«е……ж–Үжң¬
  const p0Lines = ep[0] || [];
  pages[0].innerHTML = p0Lines.map(l => `<p class="intro-text">${l}</p>`).join('');

  const p1Lines = (ep[1] || [])[lv - 1] || [];
  pages[1].innerHTML = p1Lines.map(l => `<p class="intro-text">${l}</p>`).join('');

  const p2Lines = (ep[2] || [])[lv - 1] || [];
  pages[2].innerHTML = p2Lines.map(l => `<p class="intro-sub">${l}</p>`).join('');

  lblEl.textContent = t('stage' + lv);
  tapEl.textContent = t('endingTap');
  retryBtn.textContent = t('endingContinue');

  el.style.display = 'flex';
  el.style.background = '#000';

  let pageIdx = 0;
  let busy = false;
  let _endBirthSaved = null;
  pages[0].classList.add('active');

  function enterGhostScene() {
    const hidden = [];
    scene.children.forEach(obj => {
      if (obj === ghostGroup || obj.isLight) return;
      if (obj.visible) { obj.visible = false; hidden.push(obj); }
    });
    const savedBg = scene.background.clone();
    const savedFN = scene.fog.near, savedFF = scene.fog.far;
    const savedPos = camera.position.clone();
    const savedTgt = controls.target.clone();
    scene.background = new THREE.Color(0x000000);
    scene.fog.near = 999; scene.fog.far = 1000;
    camera.position.set(0, 2.6, 3.2);
    controls.target.set(0, 2.2, 0);
    controls.update(); controls.enabled = false;
    el.style.transition = 'background 1.2s ease';
    el.style.background = 'rgba(0,0,0,0)';
    _endBirthSaved = { hidden, savedBg, savedFN, savedFF, savedPos, savedTgt };
  }

  function leaveGhostScene() {
    if (!_endBirthSaved) return;
    const s = _endBirthSaved; _endBirthSaved = null;
    el.style.transition = 'none';
    el.style.background = '#000';
    requestAnimationFrame(() => {
      s.hidden.forEach(obj => { obj.visible = true; });
      scene.background = s.savedBg;
      scene.fog.near = s.savedFN; scene.fog.far = s.savedFF;
      camera.position.copy(s.savedPos);
      controls.target.copy(s.savedTgt);
      controls.update(); controls.enabled = true;
    });
  }

  function goToPage(idx) {
    if (pageIdx === 1) leaveGhostScene();
    pages[pageIdx].classList.remove('active');
    pageIdx = idx;
    if (pageIdx >= pages.length) { finish(); return; }
    pages[pageIdx].classList.add('active');
    if (pageIdx === 1) { enterGhostScene(); lblEl.style.opacity='1'; tapEl.style.opacity='1'; }
    if (pageIdx === 2) { lblEl.style.opacity='0'; tapEl.style.opacity='0'; retryBtn.style.display='block'; }
  }

  function finish() {
    if (_endBirthSaved) leaveGhostScene();
    el.classList.add('done');
    setTimeout(() => {
      el.style.display = 'none';
      el.classList.remove('done');
      // жҒўеӨҚжёёжҲҸз»§з»ӯпјҲдёҚйҮҚзҪ®пјҢзӣҙжҺҘз»§з»ӯе®ҲжҠӨпјү
      gs.dead = false;
      gs.inDayScene = false;
      if (ghostGroup) ghostGroup.visible = true;
    }, 1200);
  }

  lblEl.style.opacity = '0'; tapEl.style.opacity = '0';
  el.addEventListener('pointerdown', () => {
    if (busy) return;
    busy = true; setTimeout(() => { busy = false; }, 700);
    if (pageIdx === pages.length - 1) { finish(); return; }
    goToPage(pageIdx + 1);
  });
  retryBtn.addEventListener('pointerdown', e => { e.stopPropagation(); finish(); });
}

  let _birthSaved = null;
  pages[0].classList.add('active');

  function enterBirthScene() {
    // йҡҗи—ҸжүҖжңүеңәжҷҜзү©д»¶пјҢеҸӘз•ҷе№ҪзҒө
    const hidden = [];
    scene.children.forEach(obj => {
      if (obj === ghostGroup || obj.isLight) return;
      if (obj.visible) { obj.visible = false; hidden.push(obj); }
    });
    const savedBg  = scene.background.clone();
    const savedFN  = scene.fog.near, savedFF = scene.fog.far;
    const savedPos = camera.position.clone();
    const savedTgt = controls.target.clone();

    scene.background = new THREE.Color(0x000000);
    scene.fog.near = 999; scene.fog.far = 1000;
    // ж‘„еғҸеӨҙжӢүиҝ‘пјҢжӯЈеҜ№е№ҪзҒө
    camera.position.set(0, 2.6, 2.8);
    controls.target.set(0, 2.2, 0);
    controls.update();
    controls.enabled = false;

    // intro иғҢжҷҜж”№йҖҸжҳҺпјҢThree.js з”»еёғйҖҸеҮәпјҲеҸӘжңүе№ҪзҒө+й»‘иүІпјү
    el.style.transition = 'background 1.2s ease';
    el.style.background = 'rgba(0,0,0,0)';

    _birthSaved = { hidden, savedBg, savedFN, savedFF, savedPos, savedTgt };
  }

  function leaveBirthScene() {
    if (!_birthSaved) return;
    const s = _birthSaved; _birthSaved = null;
    // е…Ҳз«ӢеҲ»йҒ®дҪҸпјҲеҺ»жҺү transitionпјҢзһ¬й—ҙеҸҳй»‘пјү
    el.style.transition = 'none';
    el.style.background = '#000';
    // дёӢдёҖеё§еҶҚжҒўеӨҚеңәжҷҜпјҢзЎ®дҝқй»‘иүІе·ІжёІжҹ“
    requestAnimationFrame(() => {
      s.hidden.forEach(obj => { obj.visible = true; });
      scene.background = s.savedBg;
      scene.fog.near = s.savedFN; scene.fog.far = s.savedFF;
      camera.position.copy(s.savedPos);
      controls.target.copy(s.savedTgt);
      controls.update();
      controls.enabled = true;
    });
  }

  function goToPage(idx) {
    if (pageIdx === 2) leaveBirthScene();

    pages[pageIdx].classList.remove('active');
    dots[pageIdx] && dots[pageIdx].classList.remove('on');
    pageIdx = idx;

    if (pageIdx >= pages.length) { dismiss(); return; }

    pages[pageIdx].classList.add('active');
    dots[pageIdx] && dots[pageIdx].classList.add('on');

    if (pageIdx === 2) enterBirthScene();
  }

  function advance() {
    if (busy) return;
    busy = true;
    setTimeout(() => { busy = false; }, 700);
    goToPage(pageIdx + 1);
  }

  function dismiss() {
    if (pageIdx === 2) leaveBirthScene();
    _introActive = false;
    gameEls.forEach(e => { if(e) e.style.visibility=''; });
    el.classList.add('done');
    setTimeout(() => { el.style.display='none'; el.classList.remove('done'); }, 1200);
  }

  // зӮ№еҮ»ж•ҙдёӘ intro зҝ»йЎөпјҲи·іиҝҮжҢүй’®йҷӨеӨ–пјү
  el.addEventListener('pointerdown', e => {
    if (e.target === skipBtn || skipBtn.contains(e.target)) return;
    advance();
  });
  skipBtn.addEventListener('pointerdown', e => { e.stopPropagation(); dismiss(); });
}

function checkLevel() {
  // жҢүзҙҜи®ЎзҒөзҒ«еҚҮзә§пјҡ25вҶ’жҲҗзҒөпјҢ60вҶ’еӨ§зҒө
  const newLv = gs.totalFire >= 60 ? 3 : gs.totalFire >= 25 ? 2 : 1;

}

//  ACTIONS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function doAction(type) {
  if (gs.cd[type] > 0) return;
  checkWish(type);
  switch(type) {
    case 'pet':
      gs.mood = Math.min(100, gs.mood+14);
      gs.totalHappy += 12;
      for (let i=0;i<5;i++) setTimeout(spawnHeart, i*100);
      showPopup(t('popPet'), '#ff80e0');
      snd.pet();
      gs.bounceT=0; gs.cd.pet=2.5;
      break;
    case 'feed':
      if (gs.hunger>=96) { showPopup(t('popFull'),'#ffa'); return; }
      if (!spendFire(2)) { showPopup(t('popNoFire'),'#ff8040'); return; }
      gs.hunger = Math.min(100, gs.hunger+28);
      gs.mood   = Math.min(100, gs.mood+5);
      gs.totalHappy += 5;
      showPopup(t('popFeed'), '#ffcc60');
      snd.feed();
      gs.bounceT=0; gs.cd.feed=3;
      break;
    case 'play':
      if (gs.energy<18) { showPopup(t('popTired'),'#80c8ff'); return; }
      gs.mood   = Math.min(100, gs.mood+22);
      gs.energy = Math.max(0, gs.energy-22);
      gs.totalHappy += 20;
      gs.playing=true;
      for (let i=0;i<6;i++) setTimeout(spawnStar, i*200);
      showPopup(t('popPlay'), '#c080ff');
      snd.play();
      gs.bounceT=0; gs.cd.play=5;
      setTimeout(()=>{ gs.playing=false; },3500);
      break;
    case 'rest':
      gs.energy = Math.min(100, gs.energy+32);
      gs.mood   = Math.max(0, gs.mood-2);
      gs.resting=true;
      showPopup(t('popRest'), '#80c8ff');
      snd.rest();
      gs.cd.rest=4;
      setTimeout(()=>{ gs.resting=false; },3000);
      break;
  }
  updateSubDisplay();
}

const raycaster = new THREE.Raycaster();
const pointer   = new THREE.Vector2();
canvas.addEventListener('pointerdown', e => {
  pointer.x =  (e.clientX/innerWidth)*2-1;
  pointer.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(pointer, camera);

  // Ghost
  if (ghostGroup && raycaster.intersectObject(ghostGroup,true).length>0) { doAction('pet'); return; }

  // зҶ„зҒӯзҡ„иңЎзғӣ вҶ’ зӮ№зҮғ вҶ’ +зҒөзҒ«
  for (const slot of candleSlots) {
    if (!slot.lit && raycaster.intersectObject(slot.group,true).length>0) {
      relightCandle(slot); addFire(2);
      showPopup(t('popCandle'), '#ffaa44');
      snd.candle();
      gs.bounceT=0; return;
    }
  }

  // ж•ҢдәәпјҲзӮ№еҮ»иө¶иө°пјү
  for (const enemy of enemyObjects) {
    if (raycaster.intersectObject(enemy.mesh,true).length>0) { snd.pet(); collectEnemy(enemy); return; }
  }

  // йҡҸжңәдәӢд»¶еҜ№иұЎ
  for (const evt of eventObjects) {
    if (raycaster.intersectObject(evt.mesh,true).length>0) { snd.collect(); collectEvent(evt); return; }
  }
});

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  IDLE ACTION ANIMATIONS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let idleAnim = null;   // { type, t, dur }
let idleNextT = 2 + Math.random() * 3;

// ease in-out (smooth step)
const eio = p => p < .5 ? 2*p*p : 1-2*(1-p)*(1-p);

function tickIdleAnim(dt, BASE_Y, hover) {
  // еҸӘеңЁиҮӘз”ұйЈҳжө®ж—¶и§ҰеҸ‘
  if (gs.playing || gs.resting || gs.bounceT < 1.5 || !ghostGroup) return false;

  if (!idleAnim) {
    idleNextT -= dt;
    if (idleNextT <= 0) {
      // еҚұйҷ©ж—¶еҸӘйўӨжҠ–пјҢеҗҰеҲҷжҢүеҝғжғ…жқғйҮҚйҖү
      let pool;
      if (gs.dangerTimer > 4) {
        pool = ['shiver','shiver','wiggle'];
      } else if (gs.mood > 65) {
        pool = ['spin','puff','lookAround','drift','nod','bounce','wiggle','tilt','peek','spin'];
      } else {
        pool = ['nod','lookAround','drift','shiver','tilt','peek','wiggle'];
      }
      const type = pool[Math.floor(Math.random()*pool.length)];
      const durs = { spin:1.6, nod:0.9, lookAround:2.0, puff:1.2, drift:2.2, shiver:0.8,
                     bounce:0.9, wiggle:1.1, tilt:1.4, peek:1.8 };
      idleAnim = { type, t: 0, dur: durs[type] };
      idleNextT = 2 + Math.random() * 3;
    }
  }

  if (!idleAnim) return false;

  idleAnim.t += dt;
  const p  = Math.min(1, idleAnim.t / idleAnim.dur);
  const sp = eio(p);

  switch (idleAnim.type) {
    case 'spin':
      ghostGroup.position.y  = BASE_Y + hover;
      ghostGroup.rotation.y  = sp * Math.PI * 2;
      ghostGroup.rotation.z  = Math.sin(totalT*.85)*.03;
      ghostGroup.rotation.x  = Math.sin(totalT*1.1)*.025;
      ghostGroup.scale.setScalar(gs.lvScale);
      break;

    case 'nod': {
      const a = sp < .5 ? sp*2*.38 : (1-sp)*2*.38;
      ghostGroup.position.y  = BASE_Y + hover;
      ghostGroup.rotation.x  = a;
      ghostGroup.rotation.y  = Math.sin(totalT*.35)*.12;
      ghostGroup.rotation.z  = Math.sin(totalT*.85)*.03;
      ghostGroup.scale.setScalar(gs.lvScale);
      break;
    }

    case 'lookAround': {
      let yr;
      if      (p < .3) yr = -(p/.3)*.85;
      else if (p < .7) yr = -.85 + ((p-.3)/.4)*1.7;
      else             yr =  .85 - ((p-.7)/.3)*.85;
      ghostGroup.position.y  = BASE_Y + hover;
      ghostGroup.rotation.y  = yr;
      ghostGroup.rotation.x  = Math.sin(totalT*1.1)*.025;
      ghostGroup.rotation.z  = Math.sin(totalT*.85)*.03;
      ghostGroup.scale.setScalar(gs.lvScale);
      break;
    }

    case 'puff': {
      const s = gs.lvScale * (1 + (sp < .45 ? (sp/.45)*.2 : ((1-sp)/.55)*.2));
      ghostGroup.scale.setScalar(s);
      ghostGroup.position.y  = BASE_Y + hover + (sp < .45 ? (sp/.45)*.18 : 0);
      ghostGroup.rotation.y  = Math.sin(totalT*.35)*.12;
      ghostGroup.rotation.x  = Math.sin(totalT*1.1)*.025;
      ghostGroup.rotation.z  = Math.sin(totalT*.85)*.03;
      break;
    }

    case 'drift': {
      const rise = Math.sin(p * Math.PI) * .5;
      ghostGroup.position.y  = BASE_Y + hover + rise;
      ghostGroup.rotation.y  = Math.sin(totalT*.35)*.12 + Math.sin(p*Math.PI)*.35;
      ghostGroup.rotation.z  = Math.sin(p*Math.PI*2)*.07;
      ghostGroup.rotation.x  = Math.sin(totalT*1.1)*.025;
      ghostGroup.scale.setScalar(gs.lvScale);
      break;
    }

    case 'shiver': {
      ghostGroup.position.y  = BASE_Y + hover;
      ghostGroup.rotation.z  = Math.sin(idleAnim.t*30)*.13*(1-p);
      ghostGroup.rotation.x  = Math.sin(idleAnim.t*22)*.07*(1-p);
      ghostGroup.rotation.y  = Math.sin(totalT*.35)*.12;
      ghostGroup.scale.setScalar(gs.lvScale);
      break;
    }

    case 'bounce': {
      // squash-stretch jump
      const bp = Math.sin(p * Math.PI);
      const sy = 1 - bp * .25; // squash y
      const sx = 1 + bp * .15; // stretch x/z
      ghostGroup.position.y  = BASE_Y + hover + bp * .55;
      ghostGroup.scale.set(sx * gs.lvScale, sy * gs.lvScale, sx * gs.lvScale);
      ghostGroup.rotation.y  = Math.sin(totalT*.35)*.12;
      ghostGroup.rotation.z  = Math.sin(totalT*.85)*.03;
      ghostGroup.rotation.x  = 0;
      break;
    }

    case 'wiggle': {
      // excited side-to-side shake
      const freq = 18;
      const amp  = .22 * (1 - p * .5);
      ghostGroup.position.y  = BASE_Y + hover;
      ghostGroup.rotation.z  = Math.sin(idleAnim.t * freq) * amp;
      ghostGroup.rotation.x  = Math.sin(idleAnim.t * freq * .7) * amp * .4;
      ghostGroup.rotation.y  = Math.sin(totalT*.35)*.12;
      ghostGroup.scale.setScalar(gs.lvScale * (1 + Math.abs(Math.sin(idleAnim.t * freq)) * .04));
      break;
    }

    case 'tilt': {
      // lean to one side curiously, then straighten
      const side = idleAnim.side || (idleAnim.side = Math.random() > .5 ? 1 : -1);
      const ta   = sp < .5 ? sp * 2 : 2 - sp * 2;
      ghostGroup.position.y  = BASE_Y + hover;
      ghostGroup.rotation.z  = side * ta * .45;
      ghostGroup.rotation.y  = Math.sin(totalT*.35)*.12;
      ghostGroup.rotation.x  = ta * .08;
      ghostGroup.scale.setScalar(gs.lvScale);
      break;
    }

    case 'peek': {
      // bob forward (x+), pause, return вҖ” like peeking at something
      let px;
      if      (p < .3) px = eio(p / .3);
      else if (p < .65) px = 1;
      else              px = eio(1 - (p - .65) / .35);
      ghostGroup.position.y  = BASE_Y + hover + px * .12;
      ghostGroup.position.x  = px * .28;
      ghostGroup.rotation.x  = px * .22;
      ghostGroup.rotation.y  = Math.sin(totalT*.35)*.12;
      ghostGroup.rotation.z  = Math.sin(totalT*.85)*.03;
      ghostGroup.scale.setScalar(1 + px * .06);
      break;
    }
  }

  if (p >= 1) {
    idleAnim = null;
    ghostGroup.scale.setScalar(gs.lvScale);
    ghostGroup.position.x = 0; // reset peek offset
  }
  return true;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  ANIMATION LOOP
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let lastTs=0, totalT=0;
function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts-lastTs)*.001, .05);
  lastTs=ts; totalT+=dt;

  if (gs.dead) { controls.update(); renderer.render(scene, camera); return; }

  updateStats(dt);
  updateCandles(dt, totalT);
  updateEvents(dt, totalT);
  updateEnemies(dt, totalT);
  updateWish(dt);
  tickParticles(dt);
  updateAmbientFX(totalT);

  if (ghostGroup) {
    const BASE_Y=2.2, hover=Math.sin(totalT*1.75)*.11;
    if (gs.playing) {
      ghostGroup.position.y = BASE_Y+Math.abs(Math.sin(totalT*5))*.28+hover*.4;
      ghostGroup.rotation.z = Math.sin(totalT*7)*.13;
      ghostGroup.rotation.y = Math.sin(totalT*.8)*.3;
    } else if (gs.resting) {
      ghostGroup.position.y = BASE_Y-.1+hover*.3;
      ghostGroup.rotation.z = Math.sin(totalT*.5)*.05;
      ghostGroup.rotation.x = .06;
    } else if (gs.bounceT < 1.5) {
      gs.bounceT += dt;
      const b = Math.sin(gs.bounceT*9)*.22*Math.max(0,1-gs.bounceT*.85);
      ghostGroup.position.y = BASE_Y+hover+Math.max(0,b);
      ghostGroup.rotation.z = Math.sin(totalT*4)*.08;
    } else if (!tickIdleAnim(dt, BASE_Y, hover)) {
      ghostGroup.position.y = BASE_Y+hover;
      ghostGroup.rotation.z = Math.sin(totalT*.85)*.03;
      ghostGroup.rotation.x = Math.sin(totalT*1.1)*.025;
      ghostGroup.rotation.y = Math.sin(totalT*.35)*.12;
      ghostGroup.scale.setScalar(gs.lvScale);
    }
    ghostGroup.position.x = .3+Math.sin(totalT*.55)*.08;
    ghostGroup.position.z = .5+Math.cos(totalT*.45)*.06;
    ghostGlow.position.copy(ghostGroup.position); ghostGlow.position.y+=.2;
    ghostGlow.intensity = .4+Math.sin(totalT*2.3)*.15;
    // Lv3 зҒөйӯӮе°Ҹзҗғз»•иә«ж—ӢиҪ¬
    if (ghostParts.orbs) {
      ghostParts.orbs.forEach(o => {
        const a = o.baseAng + totalT * 0.9;
        o.mesh.position.set(Math.cos(a) * o.r, 0.15 + Math.sin(totalT * 1.5 + o.baseAng) * 0.12, Math.sin(a) * o.r);
      });
    }
  }

  controls.update();
  renderer.render(scene, camera);
}
